name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs-site/**'

env:
  NODE_VERSION: '22'

jobs:
  # ── 1. Определить версию и создать тег ────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            # Первый релиз — тегируем текущую версию без изменений
            NEW="$CURRENT"
          else
            COMMITS=$(git log "$LAST_TAG..HEAD" --oneline)
            if [ -z "$COMMITS" ]; then
              echo "No new commits since $LAST_TAG — skipping release"
              echo "skipped=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Версию считаем от последнего тега, а не от package.json
            TAG_VER="${LAST_TAG#v}"
            TAG_MAJOR=$(echo $TAG_VER | cut -d. -f1)
            TAG_MINOR=$(echo $TAG_VER | cut -d. -f2)
            TAG_PATCH=$(echo $TAG_VER | cut -d. -f3)

            if echo "$COMMITS" | grep -qiE "feat(\(|!|:)"; then
              NEW="$TAG_MAJOR.$((TAG_MINOR + 1)).0"
            else
              NEW="$TAG_MAJOR.$TAG_MINOR.$((TAG_PATCH + 1))"
            fi
          fi

          echo "Bumping $CURRENT → $NEW"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Обновляем файлы только если версия изменилась
          if [ "$NEW" != "$CURRENT" ]; then
            npm version "$NEW" --no-git-tag-version
            node -e "
              const fs = require('fs');
              const m = JSON.parse(fs.readFileSync('public/manifest.json', 'utf8'));
              m.version = '$NEW';
              fs.writeFileSync('public/manifest.json', JSON.stringify(m, null, 2) + '\n');
            "
            git add package.json package-lock.json public/manifest.json
            git commit -m "chore(release): v$NEW [skip ci]"
            git push origin main
          fi

          git tag "v$NEW"
          git push origin "v$NEW"

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "skipped=false" >> $GITHUB_OUTPUT

  # ── 2. Собрать, упаковать, создать релиз и задеплоить Pages ──────────────
  release:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package CRX3 + ZIP
        run: |
          mkdir -p keys
          printf '%s\n' "${{ secrets.CRX_PRIVATE_KEY }}" > keys/private-key.pem
          node scripts/package.js v${{ needs.version.outputs.version }}

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p docs
          cp build/*.crx docs/extension.crx
          if [ -n "${{ secrets.EXTENSION_ID }}" ]; then
            EXTENSION_ID=${{ secrets.EXTENSION_ID }} \
            BASE_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} \
            node scripts/generate-updates-xml.js
          else
            echo "⚠️  EXTENSION_ID secret not set — skipping updates.xml"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: |
            build/*.crx
            build/*.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
